name: Bug report
description: Report a defect
labels: [bug]
body:
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: atp
    attributes:
      label: ATP regression coverage
      description: Which ATP scenario should guard this bug?
