name: Main Nightly Extended

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read

jobs:
  extended-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Detect Android project
        id: detect
        run: |
          if [ -f ./gradlew ]; then
            echo "has_project=true" >> $GITHUB_OUTPUT
          else
            echo "has_project=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip until scaffold exists
        if: steps.detect.outputs.has_project == 'false'
        run: echo "Android project not scaffolded yet."

      - name: Run ATP full suite
        if: steps.detect.outputs.has_project == 'true'
        run: ./gradlew testDebugUnitTest -Patp

      - name: Run emulator flow suite placeholder
        if: steps.detect.outputs.has_project == 'true'
        run: echo "Add connected Android flow tests after app scaffold."
