name: Android CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Detect Android project
        id: detect
        run: |
          if [ -f ./gradlew ] && { [ -f ./settings.gradle.kts ] || [ -f ./settings.gradle ]; }; then
            echo "has_project=true" >> $GITHUB_OUTPUT
          else
            echo "has_project=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip until scaffold exists
        if: steps.detect.outputs.has_project == 'false'
        run: echo "Android project not scaffolded yet."

      - name: Lint
        if: steps.detect.outputs.has_project == 'true'
        run: ./gradlew lint

      - name: Build
        if: steps.detect.outputs.has_project == 'true'
        run: ./gradlew build -x test

      - name: Unit tests
        if: steps.detect.outputs.has_project == 'true'
        run: ./gradlew test

      - name: ATP tests
        if: steps.detect.outputs.has_project == 'true'
        run: ./gradlew testDebugUnitTest -Patp
